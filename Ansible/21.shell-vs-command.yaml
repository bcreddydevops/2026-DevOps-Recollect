- name: ansible command vs shell module
  hosts: local
  connection: local
  tasks:
  - name: command module test
    #ansible.builtin.command: cat /etc/passwd | grep root
    ansible.builtin.shell: cat /etc/passwd | grep root
    register: users_output

  - name: print output
    ansible.builtin.debug:
      msg: "{{ users_output }}"

  - name: command module test
    #ansible.builtin.command: cat /etc/passwd | grep root
    ansible.builtin.shell: ls -ltr > files.txt
    register: files_output

  - name: print output of files
    ansible.builtin.debug:
      msg: "{{ files_output }}"

  - name: shell vs command
  hosts: frontend
  tasks:
  - name: redirect ls output to a file
    #ansible.builtin.command: "ls -ltr > /tmp/output.txt"
    ansible.builtin.shell: "ls -ltr > /tmp/output.txt"
    register: command_result

  - name: print the outcome
    ansible.builtin.debug:
      msg: "{{ command_result }}"

  - name: redirect ls output to a file using command
    ansible.builtin.command: "ls -ltr"
    #ansible.builtin.shell: "ls -ltr > /tmp/output.txt"
    register: command_output
  
  - name: print the output
    ansible.builtin.debug:
      msg: "{{ command_output }}"

